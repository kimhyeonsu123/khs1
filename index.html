<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Breaker Rank Game</title>
    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --main-black: #222;
            --brick-color: #e74c3c;
            --paddle-color: #3498db;
            --ball-color: #2ecc71;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 80vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* UI Screens */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .hidden { display: none !important; }

        h1 { margin-bottom: 30px; color: var(--main-black); }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 200px; }
        .btn {
            background-color: var(--main-black);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }

        /* Score Display */
        #hud {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            pointer-events: none;
            font-weight: bold;
            color: #333;
        }

        /* Ranking Table */
        #rank-list {
            width: 80%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        #rank-list th, #rank-list td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        /* Input for Name */
        #name-input {
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="score-display">Score: 0</div>
        <div id="life-display">Lives: 3</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
        <h1>Brick Breaker</h1>
        <div class="btn-group">
            <button class="btn" onclick="startGame()">Game Start</button>
            <button class="btn" onclick="showRankings()">Ranking</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="overlay hidden">
        <h2 id="final-status">GAME OVER</h2>
        <p>Your Score: <span id="final-score">0</span></p>
        <input type="text" id="player-name" placeholder="Enter Nickname" maxlength="10">
        <div class="btn-group">
            <button class="btn" onclick="saveAndReset()">Save Score</button>
            <button class="btn" onclick="location.reload()">Back to Menu</button>
        </div>
    </div>

    <!-- Ranking Screen -->
    <div id="rank-screen" class="overlay hidden">
        <h2>Top 10 Rankings</h2>
        <table id="rank-list">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="rank-data"></tbody>
        </table>
        <br>
        <button class="btn" onclick="hideRankings()">Close</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (본인의 정보로 교체하세요) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDMHYqSp8N4ZOmx5U1S7TdYJzY36-GDR6w",
  authDomain: "brick-breaking1.firebaseapp.com",
  projectId: "brick-breaking1",
  storageBucket: "brick-breaking1.firebasestorage.app",
  messagingSenderId: "79322971934",
  appId: "1:79322971934:web:e7952bfbc672868bd1530f"
    };

    // Firebase 초기화 (이미 초기화되었는지 확인)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- GAME LOGIC ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 반응형 캔버스 크기 설정
    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let lives = 3;
    let gameRunning = false;

    // Ball
    let x, y, dx, dy;
    const ballRadius = 8;

    // Paddle
    const paddleHeight = 10;
    let paddleWidth = 75;
    let paddleX;

    // Bricks
    const brickRowCount = 5;
    const brickColumnCount = 5;
    const brickPadding = 10;
    const brickOffsetTop = 50;
    const brickOffsetLeft = 30;
    let bricks = [];

    function initBricks() {
        const totalPadding = brickPadding * (brickColumnCount - 1);
        const availableWidth = canvas.width - (brickOffsetLeft * 2) - totalPadding;
        const currentBrickWidth = availableWidth / brickColumnCount;

        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }
    }

    function resetBallAndPaddle() {
        x = canvas.width / 2;
        y = canvas.height - 30;
        dx = 3;
        dy = -3;
        paddleX = (canvas.width - paddleWidth) / 2;
    }

    // Controls
    document.addEventListener("mousemove", mouseMoveHandler, false);
    document.addEventListener("touchmove", touchMoveHandler, { passive: false });

    function mouseMoveHandler(e) {
        const relativeX = e.clientX - canvas.offsetLeft;
        if (relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth / 2;
        }
    }

    function touchMoveHandler(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const relativeX = touch.clientX - canvas.offsetLeft;
        if (relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth / 2;
        }
    }

    function collisionDetection() {
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                let b = bricks[c][r];
                if (b.status === 1) {
                    const brickWidth = (canvas.width - brickOffsetLeft * 2 - (brickPadding * (brickColumnCount - 1))) / brickColumnCount;
                    if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + 20) {
                        dy = -dy;
                        b.status = 0;
                        score += 10;
                        document.getElementById("score-display").innerText = `Score: ${score}`;
                        if (score === brickRowCount * brickColumnCount * 10) {
                            gameOver(true);
                        }
                    }
                }
            }
        }
    }

    function drawBall() {
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#2ecc71";
        ctx.fill();
        ctx.closePath();
    }

    function drawPaddle() {
        ctx.beginPath();
        ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
        ctx.fillStyle = "#3498db";
        ctx.fill();
        ctx.closePath();
    }

    function drawBricks() {
        const brickWidth = (canvas.width - brickOffsetLeft * 2 - (brickPadding * (brickColumnCount - 1))) / brickColumnCount;
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                if (bricks[c][r].status === 1) {
                    let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                    let brickY = (r * (20 + brickPadding)) + brickOffsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    ctx.beginPath();
                    ctx.rect(brickX, brickY, brickWidth, 20);
                    ctx.fillStyle = "#e74c3c";
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function draw() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawBall();
        drawPaddle();
        collisionDetection();

        if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
        if (y + dy < ballRadius) dy = -dy;
        else if (y + dy > canvas.height - ballRadius - 10) {
            if (x > paddleX && x < paddleX + paddleWidth) {
                dy = -dy;
            } else {
                lives--;
                document.getElementById("life-display").innerText = `Lives: ${lives}`;
                if (!lives) {
                    gameOver(false);
                } else {
                    resetBallAndPaddle();
                }
            }
        }

        x += dx;
        y += dy;
        requestAnimationFrame(draw);
    }

    function startGame() {
        score = 0;
        lives = 3;
        document.getElementById("score-display").innerText = "Score: 0";
        document.getElementById("life-display").innerText = "Lives: 3";
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("gameover-screen").classList.add("hidden");
        resize();
        initBricks();
        resetBallAndPaddle();
        gameRunning = true;
        draw();
    }

    function gameOver(win) {
        gameRunning = false;
        document.getElementById("gameover-screen").classList.remove("hidden");
        document.getElementById("final-status").innerText = win ? "YOU WIN!" : "GAME OVER";
        document.getElementById("final-score").innerText = score;
    }

    // --- FIREBASE DATA OPS ---
    async function saveAndReset() {
        const name = document.getElementById("player-name").value || "Anonymous";
        try {
            await db.collection("scores").add({
                name: name,
                score: score,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Score saved!");
            location.reload();
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("Saving failed. Check Firebase Config.");
        }
    }

    async function showRankings() {
        const rankData = document.getElementById("rank-data");
        rankData.innerHTML = "<tr><td colspan='3'>Loading...</td></tr>";
        document.getElementById("rank-screen").classList.remove("hidden");

        try {
            const snapshot = await db.collection("scores")
                .orderBy("score", "desc")
                .limit(10)
                .get();
            
            rankData.innerHTML = "";
            let i = 1;
            snapshot.forEach(doc => {
                const data = doc.data();
                const row = `<tr>
                    <td>${i++}</td>
                    <td>${data.name}</td>
                    <td>${data.score}</td>
                </tr>`;
                rankData.innerHTML += row;
            });
        } catch (e) {
            rankData.innerHTML = "<tr><td colspan='3'>Error loading rankings.</td></tr>";
        }
    }

    function hideRankings() {
        document.getElementById("rank-screen").classList.add("hidden");
    }

</script>
</body>
</html>
